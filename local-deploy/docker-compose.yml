services:

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: attendance-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  backend:
    build: ./backend
    container_name: attendance-backend
    ports:
      - "3000:3000"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - PORT=3000
    depends_on:
      - dynamodb-local

  frontend:
    build: ./frontend
    container_name: attendance-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
