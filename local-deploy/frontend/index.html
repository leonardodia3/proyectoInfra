<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia — Panel Local</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="responsive.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="dot"></span>
    <h1>Control de Asistencia</h1>
    <span class="env-badge" id="env-badge">entorno local</span>
  </div>
</header>

<main class="layout">

  <section class="panel panel-wide deploy-only" id="panel-auth">
    <div class="panel-header">
      <h2>Sesión Cognito</h2>
      <span class="status-pill" id="auth-status">sin sesión</span>
    </div>
    <form id="form-login">
      <label>Usuario o correo
        <input type="text" name="username" autocomplete="username" placeholder="director@colegio.com">
      </label>
      <label>Contraseña
        <input type="password" name="password" autocomplete="current-password" placeholder="Contraseña Cognito">
      </label>
      <label>API Key del ESP32 para simular RFID
        <input type="password" name="apiKey" id="input-api-key" autocomplete="off" placeholder="Se usa solo en esta sesion del navegador">
      </label>
      <div class="button-row">
        <button type="submit">Iniciar sesión</button>
        <button type="button" id="btn-logout" class="secondary">Cerrar sesión</button>
      </div>
    </form>
    <p class="feedback" id="feedback-login"></p>
  </section>

  <section class="panel" id="panel-registrar">
    <h2>Registrar alumno</h2>
    <form id="form-registrar">
      <label>DNI
        <input type="text" name="dni" placeholder="12345678" required maxlength="8" inputmode="numeric" pattern="[0-9]{8}">
      </label>
      <label>Nombre completo
        <input type="text" name="name" placeholder="Juan Pérez" required>
      </label>
      <label>Correo del tutor
        <input type="email" name="email" placeholder="tutor@correo.com" required>
      </label>
      <label>Salón
        <input type="text" name="classroom" placeholder="5to C" required>
      </label>
      <label>RFID
        <input type="text" name="rfid" placeholder="RFID12345678" required>
      </label>
      <button type="submit">Registrar</button>
    </form>
    <p class="feedback" id="feedback-registrar"></p>
  </section>

  <section class="panel" id="panel-asistencia">
    <h2>Marcar asistencia</h2>
    <form id="form-asistencia">
      <label>RFID para lectura automática
        <input type="text" name="rfid" placeholder="RFID12345678">
      </label>
      <label>DNI para registro manual
        <input type="text" name="dni" placeholder="12345678" maxlength="8" inputmode="numeric" pattern="[0-9]{8}">
      </label>
      <div class="button-row">
        <button type="submit" data-method="rfid">Registrar RFID</button>
        <button type="submit" data-method="manual" class="secondary">Registrar manual</button>
      </div>
    </form>
    <p class="feedback" id="feedback-asistencia"></p>
  </section>

  <section class="panel" id="panel-historial">
    <h2>Historial de asistencia</h2>
    <form id="form-historial">
      <label>DNI del alumno
        <input type="text" name="dni" placeholder="12345678" required maxlength="8" inputmode="numeric" pattern="[0-9]{8}">
      </label>
      <button type="submit">Consultar</button>
    </form>
    <ul class="history-list" id="lista-historial"></ul>
  </section>

  <section class="panel panel-wide" id="panel-alumnos">
    <h2>Alumnos registrados</h2>
    <button id="btn-refrescar" class="secondary">Actualizar lista</button>
    <table class="students-table">
      <thead>
        <tr><th>DNI</th><th>RFID</th><th>Nombre</th><th>Correo</th><th>Salón</th><th>Acciones</th></tr>
      </thead>
      <tbody id="tabla-alumnos"></tbody>
    </table>
  </section>

</main>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
